name: Release chyi-cfg-agent

# Triggered on every push to main. If a GitHub Release for the version in
# agent/deno.json already exists, the workflow is a no-op (docs tweaks,
# refactors, etc. don't spam releases). When agent/deno.json's version
# changes, the new version's Release is built and published end-to-end.
#
# Cloud deploys are independent — Deno Deploy auto-builds on every push.
# This workflow only handles the agent binary + SHA256SUMS.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve version
        id: v
        run: |
          VERSION=$(deno eval --quiet \
            'const d = JSON.parse(Deno.readTextFileSync("agent/deno.json")); console.log(d.version);')
          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not read version from agent/deno.json"
            exit 1
          fi
          TAG="v${VERSION}"
          ASSET="chyi-cfg-agent-${VERSION}-x86_64-linux"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET"     >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION tag=$TAG"

      - name: Skip if release already exists
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.v.outputs.tag }} already exists — skipping build."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release ${{ steps.v.outputs.tag }} does not exist yet — building."
            echo "should_release=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Install npm deps (Vite, Tailwind)
        if: steps.gate.outputs.should_release == 'true'
        run: deno install --allow-scripts

      - name: fmt + lint + typecheck
        if: steps.gate.outputs.should_release == 'true'
        run: deno task check

      - name: Unit tests
        if: steps.gate.outputs.should_release == 'true'
        run: deno test -A --unstable-kv

      - name: Build cloud (for e2e smoke)
        if: steps.gate.outputs.should_release == 'true'
        run: deno task build

      - name: e2e smoke (mock agent, real cloud)
        if: steps.gate.outputs.should_release == 'true'
        run: |
          CFG_DEV_PORT=8001 deno task dev:mock > /tmp/cfg-dev.log 2>&1 &
          sleep 22
          CFG_DEV_PORT=8001 deno run -A --unstable-kv scripts/smoke_e2e.ts

      - name: Compile agent binary
        if: steps.gate.outputs.should_release == 'true'
        run: deno task agent:compile

      - name: Prepare release assets
        if: steps.gate.outputs.should_release == 'true'
        run: |
          ASSET="${{ steps.v.outputs.asset }}"
          mv dist/chyi-cfg-agent "dist/${ASSET}"
          (cd dist && sha256sum "${ASSET}" > SHA256SUMS)
          echo "--- SHA256SUMS ---"
          cat dist/SHA256SUMS
          echo "--- asset ---"
          ls -lh "dist/${ASSET}"

      - name: Publish GitHub Release
        if: steps.gate.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        # `gh release create` creates the tag automatically if it doesn't exist,
        # pointing at the commit we just built from. --target pins it explicitly.
        run: |
          gh release create "${{ steps.v.outputs.tag }}" \
            "dist/${{ steps.v.outputs.asset }}" \
            dist/SHA256SUMS \
            --title "chyi-cfg-agent ${{ steps.v.outputs.tag }} — Linux x86_64" \
            --target "${{ github.sha }}" \
            --generate-notes

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cfg-dev-log
          path: /tmp/cfg-dev.log
          if-no-files-found: ignore
